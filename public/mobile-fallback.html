<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Lemon</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background-color: #0f172a;
        color: #f1f5f9;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        padding-top: max(24px, env(safe-area-inset-top));
        padding-bottom: max(24px, env(safe-area-inset-bottom));
      }
      .card {
        max-width: 360px;
        width: 100%;
        text-align: center;
      }
      .logo {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        background: #1e293b;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        overflow: hidden;
      }
      .logo img {
        width: 40px;
        height: 40px;
        object-fit: contain;
      }
      h1 {
        font-size: 20px;
        font-weight: 700;
        margin: 0 0 8px;
      }
      p {
        font-size: 14px;
        line-height: 1.5;
        color: #94a3b8;
        margin: 0 0 24px;
      }
      button {
        appearance: none;
        border: none;
        width: 100%;
        padding: 13px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 600;
        background-color: #2563eb;
        color: #ffffff;
        cursor: pointer;
      }
      button:active {
        background-color: #1d4ed8;
      }
      .hint {
        margin-top: 16px;
        font-size: 12px;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <img src="brand/lemon-header.png" alt="" />
      </div>
      <h1>Lemon está indisponível no momento</h1>
      <p>Não foi possível conectar ao servidor. Verifique sua internet e tente novamente.</p>
      <button type="button" onclick="retry()">Tentar novamente</button>
      <p class="hint" id="hint" hidden>Ainda sem conexão. Aguarde um instante e tente de novo.</p>
    </div>
    <script>
      // Plain navigation, no Capacitor bridge involved — the retry target is
      // the exact allowed origin; if it fails again the native error handler
      // (see LemonWebViewClient / capacitor.config.ts errorPath) reloads this
      // same page, so retrying never leaves a blank screen.
      var attempted = false;
      function retry() {
        if (attempted) {
          document.getElementById('hint').hidden = false;
        }
        attempted = true;
        window.location.href = 'https://my.lemonenglish.app';
      }
    </script>
  </body>
</html>
