<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" role="img" aria-label="Lemon AI">
  <!-- Outer peel -->
  <circle cx="60" cy="60" r="56" fill="#FBBF24"/>
  <!-- Peel highlight -->
  <circle cx="60" cy="60" r="56" fill="url(#peelGrad)"/>
  <!-- Flesh -->
  <circle cx="60" cy="60" r="48" fill="#FEF08A"/>
  <!-- Pith ring -->
  <circle cx="60" cy="60" r="40" fill="none" stroke="#FEF9C3" stroke-width="7"/>
  <!-- Segment dividers — 8 slices -->
  <line x1="60" y1="20" x2="60" y2="100" stroke="#FEF9C3" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="20" y1="60" x2="100" y2="60" stroke="#FEF9C3" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="31.7" y1="31.7" x2="88.3" y2="88.3" stroke="#FEF9C3" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="88.3" y1="31.7" x2="31.7" y2="88.3" stroke="#FEF9C3" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center pip -->
  <circle cx="60" cy="60" r="8" fill="#FBBF24"/>
  <circle cx="60" cy="60" r="4" fill="#FDE68A"/>
  <!-- Glare -->
  <ellipse cx="45" cy="42" rx="10" ry="7" fill="#FFFBEB" opacity="0.45" transform="rotate(-35 45 42)"/>
  <!-- Gradient def -->
  <defs>
    <radialGradient id="peelGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FDE68A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.3"/>
    </radialGradient>
  </defs>
</svg>
