name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Type check ────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  # ── 2. Unit tests ────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test -- --reporter=verbose

  # ── 3. Build ─────────────────────────────────────────────────────────────────
  build:
    name: Vite Build
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: https://placeholder.supabase.co
      VITE_SUPABASE_ANON_KEY: placeholder-anon-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  # ── 4. Node-only E2E checks (no browser, no server) ─────────────────────────
  e2e-node-checks:
    name: E2E Node Checks (baseline + security-static)
    runs-on: ubuntu-latest
    needs: [build]
    env:
      VITE_SUPABASE_URL: https://placeholder.supabase.co
      VITE_SUPABASE_ANON_KEY: placeholder-anon-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test --project=node-checks --reporter=list
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-node
          path: playwright-report/
          retention-days: 7

  # ── 5. Browser E2E — smoke + dashboard + calendar ────────────────────────────
  e2e-browser:
    name: E2E Browser (smoke + dashboard + calendar)
    runs-on: ubuntu-latest
    needs: [build]
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
      CI: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run browser E2E tests
        run: |
          npx playwright test \
            tests/e2e/09-dashboard.spec.ts \
            tests/e2e/10-calendar.spec.ts \
            tests/e2e/11-smoke.spec.ts \
            --project=chromium \
            --reporter=list \
            --retries=1
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-browser
          path: playwright-report/
          retention-days: 7
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: test-results/
          retention-days: 7
